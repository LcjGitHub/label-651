version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: label-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - label-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: label-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8089
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8089/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
      - ./backend/exports:/app/exports
    networks:
      - label-network

networks:
  label-network:
    driver: bridge
